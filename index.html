<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Path Finder | FreeMode</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #000000;
    --bg-panel: #0a0a13;
    --bg-panel-2: #101018;
    --accent: #ff2d95;
    --accent-2: #2fd8ff;
    --text: #f5f6fb;
    --text-dim: #8b8fa3;
    --border: rgba(255,45,149,0.28);
    --border-soft: rgba(255,255,255,0.08);
  }

  *{ box-sizing: border-box; }

  html, body{
    margin: 0;
    padding: 0;
    min-height: 100vh;
  }

  body{
    background:
      radial-gradient(circle at 15% 0%, rgba(255,45,149,0.14), transparent 55%),
      radial-gradient(circle at 100% 100%, rgba(47,216,255,0.12), transparent 50%),
      var(--bg);
    color: var(--text);
    font-family: 'Montserrat', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 20px;
    -webkit-font-smoothing: antialiased;
  }

  .stage{
    width: 100%;
    max-width: 460px;
    position: relative;
  }

  .brand-tag{
    text-align: center;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.3em;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 18px;
    opacity: 0.9;
  }

  .panel{
    background: linear-gradient(180deg, var(--bg-panel-2), var(--bg-panel));
    border: 1px solid var(--border-soft);
    border-radius: 4px;
    padding: 36px 28px 32px;
    position: relative;
    box-shadow: 0 0 0 1px rgba(255,255,255,0.02), 0 20px 60px rgba(0,0,0,0.5), 0 0 40px rgba(255,45,149,0.05);
    clip-path: polygon(0 0, calc(100% - 18px) 0, 100% 18px, 100% 100%, 18px 100%, 0 calc(100% - 18px));
  }

  .panel::before{
    content: "";
    position: absolute;
    inset: 0;
    padding: 1px;
    border-radius: 4px;
    background: linear-gradient(135deg, var(--accent), transparent 35%, transparent 65%, var(--accent-2));
    -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
    -webkit-mask-composite: xor;
    mask-composite: exclude;
    clip-path: polygon(0 0, calc(100% - 18px) 0, 100% 18px, 100% 100%, 18px 100%, 0 calc(100% - 18px));
    opacity: 0.5;
    pointer-events: none;
  }

  /* progress indicator */
  .progress{
    display: none;
    align-items: center;
    gap: 10px;
    margin-bottom: 22px;
  }
  .progress.active{ display: flex; }
  .progress-label{
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.15em;
    color: var(--text-dim);
    text-transform: uppercase;
    white-space: nowrap;
  }
  .progress-bars{
    display: flex;
    gap: 6px;
    flex: 1;
  }
  .progress-bars span{
    height: 4px;
    flex: 1;
    background: rgba(255,255,255,0.08);
    border-radius: 2px;
    overflow: hidden;
    position: relative;
  }
  .progress-bars span::after{
    content: "";
    position: absolute;
    inset: 0;
    background: linear-gradient(90deg, var(--accent), var(--accent-2));
    transform: scaleX(0);
    transform-origin: left;
    transition: transform 0.4s ease;
  }
  .progress-bars span.filled::after{
    transform: scaleX(1);
    box-shadow: 0 0 8px rgba(255,45,149,0.7);
  }

  /* screens */
  .screen{ display: none; }
  .screen.active{
    display: block;
    animation: enter 0.4s ease;
  }
  @keyframes enter{
    from{ opacity: 0; transform: translateY(10px); }
    to{ opacity: 1; transform: translateY(0); }
  }

  .eyebrow{
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.2em;
    color: var(--accent);
    text-transform: uppercase;
    margin: 0 0 10px;
  }

  h1{
    font-size: 30px;
    font-weight: 800;
    line-height: 1.15;
    margin: 0 0 14px;
    letter-spacing: -0.01em;
  }

  h2{
    font-size: 22px;
    font-weight: 700;
    line-height: 1.25;
    margin: 0 0 22px;
  }

  p{
    font-size: 15px;
    line-height: 1.6;
    color: var(--text-dim);
    margin: 0 0 16px;
  }

  .tip{
    font-size: 13px;
    color: var(--text-dim);
    border-left: 2px solid var(--accent);
    padding: 10px 14px;
    background: rgba(255,45,149,0.05);
    margin: 22px 0 26px;
    line-height: 1.55;
  }
  .tip strong{ color: var(--text); }

  /* option cards (character-select tiles) */
  .options{
    display: flex;
    flex-direction: column;
    gap: 12px;
    margin-top: 4px;
  }

  .option-btn{
    all: unset;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    padding: 18px 18px;
    background: rgba(255,255,255,0.03);
    border: 1px solid var(--border-soft);
    border-radius: 2px;
    color: var(--text);
    font-weight: 600;
    font-size: 15px;
    line-height: 1.4;
    transition: border-color 0.2s ease, background 0.2s ease, transform 0.15s ease;
    clip-path: polygon(0 0, calc(100% - 10px) 0, 100% 10px, 100% 100%, 10px 100%, 0 calc(100% - 10px));
  }

  .option-btn:hover, .option-btn:focus-visible{
    border-color: var(--accent);
    background: rgba(255,45,149,0.08);
    transform: translateX(2px);
  }

  .option-btn:active{ transform: scale(0.98); }

  .option-btn .arrow{
    color: var(--accent);
    font-size: 18px;
    flex-shrink: 0;
    transition: transform 0.2s ease;
  }
  .option-btn:hover .arrow{ transform: translateX(4px); }

  /* primary CTA (start / see product) */
  .btn-primary{
    all: unset;
    cursor: pointer;
    display: block;
    text-align: center;
    width: 100%;
    padding: 16px 20px;
    margin-top: 6px;
    background: linear-gradient(90deg, var(--accent), var(--accent-2));
    color: #fff;
    font-weight: 800;
    font-size: 15px;
    letter-spacing: 0.02em;
    text-transform: uppercase;
    border-radius: 2px;
    box-shadow: 0 8px 24px rgba(255,45,149,0.25);
    transition: transform 0.15s ease, box-shadow 0.2s ease;
    clip-path: polygon(0 0, calc(100% - 14px) 0, 100% 14px, 100% 100%, 14px 100%, 0 calc(100% - 14px));
  }
  .btn-primary:hover{ transform: translateY(-1px); box-shadow: 0 10px 30px rgba(255,45,149,0.35); }
  .btn-primary:active{ transform: translateY(0); }

  a.btn-primary{ text-decoration: none; }

  .restart{
    display: block;
    text-align: center;
    margin-top: 20px;
    font-size: 12px;
    color: var(--text-dim);
    text-decoration: none;
    letter-spacing: 0.05em;
  }
  .restart:hover{ color: var(--accent); }

  .fine-print{
    text-align: center;
    font-size: 12px;
    color: var(--text-dim);
    margin-top: 18px;
  }

  @media (max-width: 380px){
    .panel{ padding: 30px 20px 26px; }
    h1{ font-size: 26px; }
    h2{ font-size: 19px; }
  }
</style>
</head>
<body>

<div class="stage">
  <div class="brand-tag">FreeMode &middot; Path Finder</div>
  <div class="panel">

    <div class="progress" id="progress">
      <div class="progress-label">Step <span id="progress-step">1</span> of 3</div>
      <div class="progress-bars" id="progress-bars">
        <span></span><span></span><span></span>
      </div>
    </div>

    <div id="screen-root"></div>

  </div>
  <div class="fine-print">No email required. No signup. Just three questions.</div>
</div>

<script>
/* ============================================================
   PATH FINDER CONFIG
   Everything the quiz says and how it branches lives here.
   To add a new question or outcome later:
     1. Add an entry to QUESTIONS (give it a unique key).
     2. Point an existing option's `next` at that key.
     3. Add a matching entry to OUTCOMES for wherever it ends.
   Nothing below this block needs to change.
   ============================================================ */

  const INTRO = {
    eyebrow: "Path Finder",
    title: "Find your path.",
    body: "Three quick questions. No email required, no signup. Just answer honestly and we'll point you to where to start.",
    buttonLabel: "Start"
  };

  const QUESTIONS = {
    q1: {
      step: 1,
      text: "Do you want to work directly with clients, or build one thing once and sell it to strangers?",
      options: [
        { label: "Work with clients", next: "q2" },
        { label: "Build it once, sell it repeatedly", next: "outcome-gumroad" }
      ]
    },
    q2: {
      step: 2,
      text: "Is this a one-time job per client, or something you'd do for them every month?",
      options: [
        { label: "One-time", next: "outcome-resume" },
        { label: "Ongoing, monthly", next: "q3" }
      ]
    },
    q3: {
      step: 3,
      text: "Are you creating general social content, or working specifically with podcasters?",
      options: [
        { label: "General social content", next: "outcome-content" },
        { label: "Podcast content", next: "outcome-podcast" }
      ]
    }
  };

  const OUTCOMES = {
    "outcome-resume": {
      path: "one-time client work.",
      body: "You want a clear job, a clear payment, and you're done. This is the fastest way to your first dollar with FreeMode, real people need resumes every day, and you can deliver one in a single sitting.",
      productName: "The Resume Writing Method",
      link: "#" // TODO: swap in real URL
    },
    "outcome-gumroad": {
      path: "build once, sell forever.",
      body: "You'd rather put in the work up front and let it sell while you sleep, instead of trading hours for dollars every time. This is the one product here that isn't about clients at all, it's about traffic.",
      productName: "The Gumroad Method",
      link: "#" // TODO: swap in real URL
    },
    "outcome-content": {
      path: "ongoing client work, general content.",
      body: "You want the same client paying you every month, not just once. This is the recurring-income version of client work, and it's the closest thing to a real retainer that costs nothing to start.",
      productName: "The Content Service Method",
      link: "#" // TODO: swap in real URL
    },
    "outcome-podcast": {
      path: "ongoing client work, podcast-specific.",
      body: "Same idea as recurring content work, but built around podcasters specifically, show notes, clips, episode packs. If you already listen to podcasts or know that world, this is the more specific, less crowded lane.",
      productName: "The Podcast Content Method",
      link: "#" // TODO: swap in real URL
    }
  };

  const TIP = "Quick tip either way: whatever path you're on, always read the finished work before you send it. AI gets you 90% there, you're the last 10%.";

/* ============================================================
   ENGINE â€” builds screens from the config above.
   ============================================================ */

  const root = document.getElementById('screen-root');
  const progressEl = document.getElementById('progress');
  const progressStepEl = document.getElementById('progress-step');
  const progressBars = document.querySelectorAll('#progress-bars span');

  function setProgress(step){
    if(!step){
      progressEl.classList.remove('active');
      return;
    }
    progressEl.classList.add('active');
    progressStepEl.textContent = step;
    progressBars.forEach((bar, i) => {
      bar.classList.toggle('filled', i < step);
    });
  }

  function renderIntro(){
    setProgress(null);
    root.innerHTML = `
      <p class="eyebrow">${INTRO.eyebrow}</p>
      <h1>${INTRO.title}</h1>
      <p>${INTRO.body}</p>
      <button class="btn-primary" id="start-btn">${INTRO.buttonLabel}</button>
    `;
    document.getElementById('start-btn').addEventListener('click', () => navigate('q1'));
  }

  function renderQuestion(key){
    const q = QUESTIONS[key];
    setProgress(q.step);
    root.innerHTML = `
      <h2>${q.text}</h2>
      <div class="options">
        ${q.options.map((opt, i) => `
          <button class="option-btn" data-next="${opt.next}">
            <span>${opt.label}</span>
            <span class="arrow">&rarr;</span>
          </button>
        `).join('')}
      </div>
    `;
    root.querySelectorAll('.option-btn').forEach(btn => {
      btn.addEventListener('click', () => navigate(btn.getAttribute('data-next')));
    });
  }

  function renderOutcome(key){
    const o = OUTCOMES[key];
    setProgress(null);
    root.innerHTML = `
      <p class="eyebrow">Your path</p>
      <h1>${o.path}</h1>
      <p>${o.body}</p>
      <div class="tip">${TIP}</div>
      <a class="btn-primary" href="${o.link}" target="_blank" rel="noopener">See ${o.productName}</a>
      <a class="restart" id="restart-link">Retake the quiz &darr;</a>
    `;
    document.getElementById('restart-link').addEventListener('click', (e) => {
      e.preventDefault();
      navigate('intro');
    });
  }

  function navigate(key){
    if(key === 'intro'){
      renderIntro();
    } else if(QUESTIONS[key]){
      renderQuestion(key);
    } else if(OUTCOMES[key]){
      renderOutcome(key);
    }
    root.parentElement.scrollTo({ top: 0, behavior: 'instant' });
    window.scrollTo({ top: 0, behavior: 'instant' });
  }

  navigate('intro');
</script>

</body>
</html>
